<!-- Chat Container -->
<!-- Related JS modules: chat.js, api.js, mcq.js -->
<div class="chat-container">
    <!-- Case Presentation Panel (full case text + images for non-history modules) -->
    <div id="case-presentation" class="case-presentation" style="display: none;">
        <div class="case-presentation-header">
            <h4 id="case-presentation-title">Case Presentation</h4>
            <button id="toggle-case-presentation" class="toggle-case-presentation" title="Collapse/Expand">&#x25BC;</button>
        </div>
        <div id="case-presentation-text" class="case-presentation-text"></div>
        <div id="case-presentation-images" class="case-presentation-images"></div>
    </div>

    <!-- Sticky one-liner for history-taking mode -->
    <div id="case-summary-header" class="case-summary-header" style="display: none;">
        <div class="case-summary-content">
            <span id="case-one-liner" class="case-one-liner-text">Loading case...</span>
        </div>
        <button id="toggle-case-summary" class="toggle-case-summary" title="Collapse/Expand">&#x25BC;</button>
    </div>

    <div id="chatbox" class="chatbox">
        <div class="welcome-message">
            <p>Welcome to MicroTutor V4!</p>
            <p>Select a case and modules above, then click "Start New Case" to begin.</p>
        </div>
    </div>

    <div id="input-area" class="input-area">
        <textarea id="user-input" placeholder="Enter your message..." rows="1" disabled></textarea>
        <div class="button-group">
            <button id="send-btn" class="btn btn-success" disabled>
                <span class="btn-icon">📤</span> Send
            </button>
            <button id="finish-btn" class="btn btn-warning" disabled>
                <span class="btn-icon">🏁</span> Finish Case
            </button>
        </div>
    </div>
</div>
<!-- Assessment section is now in its own partial: assessment-section.html -->
